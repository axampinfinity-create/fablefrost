  <style>
    h2 {
      color: #81063a !important;
    }

    :root {
      --bg: #fdf8f3;
      --surface: #ffffff;
      --text: #1a1a2e;
      --accent: #81063a;
      --warm: #e8a045;
    }

    * {
      font-family: 'DM Sans', sans-serif;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
    }

    .playfair {
      font-family: 'Poppins', serif;
    }

    .page-heading {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
    }

    .flipkart-blue {
      background: #db5d5d;
    }

    .card-shadow {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }

    .badge-veg::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #0f8a65;
      border-radius: 50%;
      margin-right: 4px;
    }

    .badge-nonveg::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #d32f2f;
      border-radius: 50%;
      margin-right: 4px;
    }

    .menu-item:hover {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      transform: translateY(-2px);
    }

    .menu-item {
      transition: all 0.2s ease;
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    .add-btn {
      transition: all 0.15s;
      background: #81063a;
      color: white;
    }

    .add-btn:hover {
      background: #a81a54;
    }

    .cart-bounce {
      animation: cartPop 0.3s ease;
    }

    @keyframes cartPop {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.3);
      }

      100% {
        transform: scale(1);
      }
    }

    .category-tab.active {
      border-bottom: 3px solid #2874f0;
      color: #2874f0;
      font-weight: 800;
    }

    .category-tab {
      border-bottom: 3px solid transparent;
    }

    .star {
      color: #ff9f00;
    }

    .offer-badge {
      background: linear-gradient(135deg, #ff6600, #ff3d00);
    }

    .hero-gradient {
      background: linear-gradient(135deg, #1a237e 0%, #2874f0 60%, #42a5f5 100%);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      padding: 8px 0;
      transition: gap 0.2s;
      text-decoration: none;
    }

    .back-btn:hover {
      gap: 10px;
    }

    .section-accent {
      width: 48px;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), var(--warm));
      margin: 8px 0 20px;
    }

    .cuisine-icon-btn {
      border: none;
      outline: none;
      cursor: pointer;
    }

    .cuisine-icon-circle {
      transition: all 0.3s ease;
    }

    .cuisine-icon-btn:hover .cuisine-icon-circle {
      transform: scale(1.1);
    }
  </style>

        </button>
      </div>
    </div>

    <!-- FILTER ROW -->
    <div class="flex gap-2 mb-3 flex-wrap">

    </div>

    <div id="no-results" class="hidden text-center py-16 text-gray-400 font-semibold">

    </div>
  </main>

    ];

    let activeFilter = "all";
    let searchQuery = "";
    let cart = JSON.parse(localStorage.getItem('fnf_cart') || '{}');

    function getFiltered() {
      return menuData.filter(item => {
        const matchSearch = item.name.toLowerCase().includes(searchQuery.toLowerCase()) || item.desc.toLowerCase().includes(searchQuery.toLowerCase());
        const matchFilter = activeFilter === "all" ||
          (activeFilter === "veg" && item.type === "veg") ||
          (activeFilter === "nonveg" && item.type === "nonveg") ||
          (activeFilter === "bestseller" && item.bestseller) ||
          (activeFilter === "indian" && item.cuisine === "indian") ||
          (activeFilter === "chinese" && item.cuisine === "chinese") ||
          (activeFilter === "continental" && item.cuisine === "continental");
        return matchSearch && matchFilter;
      });
    }

    function renderItems() {
      const grid = document.getElementById('items-grid');
      const filtered = getFiltered();

      if (filtered.length === 0) {
        document.getElementById('no-results').classList.remove('hidden');
        grid.innerHTML = '';
        return;
      }

      document.getElementById('no-results').classList.add('hidden');

      // Group items by cuisine and type
      const groups = {};
      // Define specific display orders or standard names
      filtered.forEach(item => {
        const cuisineStr = item.cuisine.charAt(0).toUpperCase() + item.cuisine.slice(1);
        const typeStr = item.type === 'veg' ? 'Veg' : 'Non-Veg';
        const key = `${cuisineStr} ${typeStr} Starters`;
        if (!groups[key]) {
          groups[key] = [];
        }
        groups[key].push(item);
      });

      let html = '';
      for (const groupName in groups) {
        html += `<div class="col-span-full mt-2 mb-2"><h2 class="text-lg font-extrabold text-[#81063a] border-b-2 border-[#81063a] border-opacity-30 pb-1">${groupName}</h2></div>`;
        html += groups[groupName].map(item => `
    <div class="menu-item" style="border-radius:16px;overflow:hidden;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.08);">
      <div style="width:100%;height:150px;overflow:hidden;position:relative;">
        <img src="${item.img}" alt="${item.name}" style="width:100%;height:100%;object-fit:cover;" />
        ${item.bestseller ? `<span style="position:absolute;top:8px;left:8px;background:#81063a;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;">🔥 Bestseller</span>` : ''}
        <span style="position:absolute;top:8px;right:8px;background:${item.type==='veg'?'#16a34a':'#dc2626'};color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;">${item.type.toUpperCase()}</span>
      </div>
      <div class="p-3">
        <h3 class="font-bold text-sm leading-snug mb-1">${item.name}</h3>
        <p class="text-xs opacity-55 mb-2 line-clamp-2">${item.desc}</p>
        <div class="flex items-center justify-between mb-2">
          <div class="flex items-center gap-2">
            ${item.originalPrice > item.price ? `<span class="text-xs opacity-50 line-through">₹${item.originalPrice}</span>` : ''}
            <span class="font-bold text-base" style="color:#81063a;">₹${item.price}</span>
          </div>
          <div class="flex items-center gap-1 text-xs" style="color:#f59e0b;">★ <span style="color:#555;">${item.rating}</span></div>
        </div>
        <div class="text-center" id="action-btn-${item.id}">
          ${cart[item.id] && cart[item.id].qty > 0 ? `
            <div class="flex items-center justify-center gap-4">
              <button onclick="removeFromCart(${item.id})" class="bg-[#81063a] text-white w-8 h-8 rounded-full font-bold hover:bg-[#a81a54] transition-colors">-</button>
              <span class="font-bold w-4">${cart[item.id].qty}</span>
              <button onclick="addToCart(${item.id})" class="bg-[#81063a] text-white w-8 h-8 rounded-full font-bold hover:bg-[#a81a54] transition-colors">+</button>
            </div>
          ` : `
            <button onclick="addToCart(${item.id})" class="add-btn w-full bg-[#81063a] text-white font-bold text-sm py-2 rounded-full transition-colors hover:bg-[#a81a54]">Add to Cart</button>
          `}
        </div>
      </div>
    </div>
  `).join('');
      }

      grid.innerHTML = html;
      lucide.createIcons();
    }

    function setFilter(filter) {
      activeFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('filter-' + filter).classList.add('active');
      renderItems();
    }

    function filterItems(query) {
      searchQuery = query;
      renderItems();
    }

    function updateItemCardUI(id) {
      const actionDiv = document.getElementById(`action-btn-${id}`);
      if (!actionDiv) return;
      if (cart[id] && cart[id].qty > 0) {
        actionDiv.innerHTML = `<div class="flex items-center justify-center gap-4"><button onclick="removeFromCart(${id})" class="bg-[#81063a] text-white w-8 h-8 rounded-full font-bold">-</button><span class="font-bold w-4">${cart[id].qty}</span><button onclick="addToCart(${id})" class="bg-[#81063a] text-white w-8 h-8 rounded-full font-bold">+</button></div>`;
      } else {
        actionDiv.innerHTML = `<button onclick="addToCart(${id})" class="add-btn w-full bg-[#81063a] text-white font-bold text-sm py-2 rounded-full transition-colors hover:bg-[#a81a54]">Add to Cart</button>`;
      }
    }

    function addToCart(id) {
      if (!cart[id]) {
        const item = menuData.find(i => i.id === id);
        if (!item) return;
        cart[id] = { ...item, qty: 0 };
      }
      cart[id].qty++;
      localStorage.setItem('fnf_cart', JSON.stringify(cart));
      updateCartUI();
      updateItemCardUI(id);
    }

    function removeFromCart(id) {
      if (cart[id]) {
        cart[id].qty--;
        if (cart[id].qty <= 0) delete cart[id];
        updateCartUI();
        updateItemCardUI(id);
      }
    }

    function updateCartUI() {
      const items = Object.values(cart);
      const count = items.reduce((s, i) => s + i.qty, 0);
      const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
      const delivery = subtotal >= 199 ? 0 : 49;
      const total = subtotal + delivery;

      const countEl = document.getElementById('cart-count');
      countEl.textContent = count;
      if (count > 0) { countEl.classList.remove('hidden'); countEl.classList.add('cart-bounce'); setTimeout(() => countEl.classList.remove('cart-bounce'), 300); }
      else countEl.classList.add('hidden');

      const cartItemsEl = document.getElementById('cart-items');
      const cartEmpty = document.getElementById('cart-empty');
      const cartFooter = document.getElementById('cart-footer');

      if (items.length === 0) {
        cartItemsEl.innerHTML = '';
        cartEmpty.classList.remove('hidden');
        cartFooter.classList.add('hidden');
      } else {
        cartEmpty.classList.add('hidden');
        cartFooter.classList.remove('hidden');
        cartItemsEl.innerHTML = '';
        items.forEach(item => {
          const div = document.createElement('div');
          div.className = 'flex items-center gap-3 bg-gray-50 rounded-lg p-2';
          div.innerHTML = `
        <span class="text-2xl">${item.emoji}</span>
        <div class="flex-1 min-w-0">
          <p class="font-bold text-sm text-gray-800 truncate">${item.name}</p>
          <p class="text-xs font-bold" style="color:#81063a;">₹${item.price} each</p>
        </div>
        <div class="flex items-center gap-1 bg-[#81063a] rounded-full px-2 py-0.5">
          <button onclick="removeFromCart(${item.id})" class="text-white font-black text-sm w-4 h-4 flex items-center justify-center">-</button>
          <span class="text-white font-black text-sm">${item.qty}</span>
          <button onclick="addToCart(${item.id})" class="text-white font-black text-sm w-4 h-4 flex items-center justify-center">+</button>
        </div>
        <span class="font-black text-sm text-gray-800 w-12 text-right">₹${item.price * item.qty}</span>`;
          cartItemsEl.appendChild(div);
        });
      }

      document.getElementById('cart-subtotal').textContent = `₹${subtotal}`;
      document.getElementById('cart-delivery').textContent = delivery === 0 ? 'FREE' : `₹${delivery}`;
      document.getElementById('cart-total').textContent = `₹${total}`;
    }

    function toggleCart() {
      const drawer = document.getElementById('cart-drawer');
      const overlay = document.getElementById('cart-overlay');
      const isOpen = !drawer.classList.contains('translate-x-full');
      if (isOpen) {
        drawer.classList.add('translate-x-full');
        overlay.classList.add('hidden');
      } else {
        drawer.classList.remove('translate-x-full');
        overlay.classList.remove('hidden');
      }
    }

    function filterByCuisine(cuisine) {
      activeFilter = cuisine;
      renderItems();
    }

    // Initialize
    renderItems();
  </script>
